name: Hotel IPTV Daily Refresh

on:
  schedule:
    - cron: '20 */4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'hotels/ALL.m3u'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests tqdm urllib3 aiohttp

      - name: Real-time Execution Scan
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "🚀 开始实时扫描..."
          python py/scan_hotel.py

      - name: Rebuild M3U Lists
        run: |
          echo "🔄 正在构建列表文件..."
          python py/rebuild_m3u.py

      - name: IPTV Speed Test
        run: |
          echo "⚡ 对最新 ALL.m3u 执行测速..."
          if [ -f "py/traffic_test.py" ]; then
            python py/traffic_test.py
          else
            echo "⚠️ 找不到测速脚本"
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📊 IPTV Refresh & Speed Test: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
