name: Hotel IPTV Daily Refresh

on:
  schedule:
    # 每 4 小时运行一次
    - cron: '20 */4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'hotels/ALL.m3u'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          # 合并两个脚本所需的所有依赖
          python -m pip install requests tqdm urllib3 aiohttp

      - name: 🔍 Step 1: Real-time Execution Scan
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "🚀 开始实时扫描酒店源..."
          python py/scan_hotel.py

      - name: 🔄 Step 2: Rebuild M3U Lists
        run: |
          echo "🔄 正在构建 ALL.m3u 列表文件..."
          # 这一步确保了 hotels/ALL.m3u 是最新生成的
          python py/rebuild_m3u.py

      - name: ⚡ Step 3: IPTV Speed Test (Against ALL.m3u)
        run: |
          echo "🚀 对最新生成的 ALL.m3u 进行流量测速..."
          # 脚本内部逻辑会自动向上找 ../hotels/ALL.m3u 进行测速
          if [ -f "py/traffic_test.py" ]; then
            python py/traffic_test.py
          else
            echo "⚠️ 错误: 找不到 py/traffic_test.py 测速脚本。"
          fi

      - name: 💾 Step 4: Final Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # git add -A 会抓取所有修改：扫描出的 M3U、新生成的报告、JSON 汇总
          git add -A
          
          if git diff --staged --quiet; then
            echo "✅ 所有文件均已是最新，无变动。"
          else
            echo "📝 提交扫描与测速汇总报告..."
            # 这里的 commit 信息包含日期，方便回溯
            git commit -m "📊 Auto-Refresh & Speed Test: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            # rebase 确保推送时不会因为远程有新提交而冲突
            git pull --rebase origin main
            git push origin main
          fi
