name: Hotel IPTV Daily Refresh

on:
  schedule:
    - cron: '20 */4 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests tqdm

      - name: Real-time Execution Scan
        env:
          PYTHONUNBUFFERED: "1" # 强制实时显示打印信息，不进缓冲区
        run: |
          echo "🚀 开始实时扫描测试..."
          python py/scan_hotel.py

      - name: Rebuild M3U Lists
        run: |
          echo "🔄 正在构建列表文件..."
          python py/rebuild_m3u.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "IPTV Auto-Refresh: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
