name: One-time Hotel Cleanup

on:
  workflow_dispatch: # 手动触发运行

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Cleanup Script
        run: python py/clean_multicast.py

      - name: Commit and Push
        run: |
          git config --global user.name "CleanupBot"
          git config --global user.email "bot@iptv.com"
          
          # 关键修改：使用 -A 记录所有变化（包括删除）
          git add -A 
          
          if git diff --staged --quiet; then
            echo "No changes detected."
            exit 0
          fi
          
          git commit -m "Clean up multicast files from hotel directory"
          git push origin main
